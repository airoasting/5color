<!DOCTYPE html>
<html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>5-Color Harness 카드 품질 감사</title>
<style>
:root{--bg:#faf8f4;--ink:#1a1a1a;--mut:#6b6b6b;--line:#e2ddd3;--burg:#7c2128;--card:#fff;--good:#1f7a4d;--mid:#b8860b;--bad:#b03030}
*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--ink);font-family:-apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo","Pretendard",sans-serif;line-height:1.6}
.wrap{max-width:1180px;margin:0 auto;padding:40px 24px 80px}
h1{font-size:30px;margin:0 0 6px;letter-spacing:-.02em}
.sub{color:var(--mut);font-size:14px;margin-bottom:28px}
.kpis{display:flex;gap:14px;flex-wrap:wrap;margin-bottom:34px}
.kpi{background:var(--card);border:1.5px solid var(--line);border-radius:14px;padding:16px 20px;min-width:150px}
.kpi .n{font-size:26px;font-weight:700;letter-spacing:-.02em}
.kpi .l{font-size:12px;color:var(--mut)}
h2{font-size:19px;margin:38px 0 14px;padding-bottom:8px;border-bottom:2px solid var(--burg)}
table{width:100%;border-collapse:collapse;font-size:13px;background:var(--card);border:1.5px solid var(--line);border-radius:10px;overflow:hidden}
th,td{padding:7px 9px;text-align:center;border-bottom:1px solid var(--line)}
th{background:#f1ece2;font-weight:600;cursor:pointer;user-select:none;white-space:nowrap;font-size:12px}
th.l,td.l{text-align:left}
tbody tr:hover{background:#f7f3ea}
.cell{display:inline-block;min-width:30px;height:24px;line-height:24px;border-radius:6px;font-weight:600;font-size:12px;padding:0 4px}
.bars{display:flex;flex-direction:column;gap:8px}
.bar{display:grid;grid-template-columns:120px 1fr 42px;align-items:center;gap:12px;font-size:13px}
.track{background:#eee7da;border-radius:6px;height:14px;overflow:hidden}
.fill{height:100%;background:var(--burg);border-radius:6px}
.catgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(210px,1fr));gap:12px}
.catcard{background:var(--card);border:1.5px solid var(--line);border-radius:12px;padding:14px 16px}
.catcard .av{font-size:24px;font-weight:700}
.wk{background:var(--card);border:1.5px solid var(--line);border-left:4px solid var(--burg);border-radius:10px;padding:16px 18px;margin-bottom:12px}
.wk h3{margin:0 0 8px;font-size:15px}
.wk .meta{font-size:12.5px;color:#444;margin:5px 0}
.tag{display:inline-block;background:#f1ece2;border-radius:5px;padding:1px 7px;font-size:11px;margin:1px 2px}
.eff{font-size:11px;padding:2px 8px;border-radius:999px;font-weight:600}
.eff.낮음{background:#e3f1e8;color:var(--good)}.eff.중간{background:#f6eed6;color:var(--mid)}.eff.높음{background:#f6e0e0;color:var(--bad)}
.narr{background:var(--card);border:1.5px solid var(--line);border-radius:12px;padding:20px 24px;font-size:15px}
details{margin:6px 0}summary{cursor:pointer;font-size:13px;color:var(--burg)}
.fixes{font-size:12.5px;color:#333;margin:6px 0 0;padding-left:18px}
.hint{font-size:12px;color:var(--mut);margin:6px 0 10px}
</style></head><body><div class=wrap>
<h1>5-Color Harness 카드 품질 감사</h1>
<div class=sub>2026-06-27 · 65개 카드 · 8개 세부 기준(각 10점) · 다이내믹 워크플로우 66개 에이전트 채점</div>

<table id=tbl><thead><tr><th data-k=rank>#</th><th class=l data-k=title>카드</th><th class=l data-k=cat>카테고리</th><th data-k=overall>종합</th><th data-k=persona_casting>페르소나</th><th data-k=passline_scene>합격선</th><th data-k=three_stage>3단</th><th data-k=workflow>흐름</th><th data-k=scoring_rubric>점수</th><th data-k=prohibitions>금지</th><th data-k=boundaries>경계</th><th data-k=house_style>문체</th></tr></thead><tbody id=tb></tbody></table>

</div><script>
const D = {"meta":{"total":65,"overallAvg":8.6,"rubric_averages":{"persona_casting":8.7,"passline_scene":8.1,"three_stage":8.9,"workflow":9,"scoring_rubric":8.3,"prohibitions":9,"boundaries":7.7,"house_style":9},"weakest_criterion":"boundaries","category_summary":[{"cat":"법무 검토·규제 대응","count":7,"avg":8.4},{"cat":"분석·보고서","count":12,"avg":8.5},{"cat":"외부 커뮤니케이션","count":12,"avg":8.6},{"cat":"의사결정·전략","count":9,"avg":8.6},{"cat":"마케팅","count":4,"avg":8.6},{"cat":"커리어·상담","count":4,"avg":8.7},{"cat":"내부 커뮤니케이션","count":8,"avg":8.8},{"cat":"소셜미디어·글쓰기","count":9,"avg":8.8}]},"rankings":[{"id":"p75","title":"성과 평가·피드백","cat":"내부 커뮤니케이션","overall":9,"scores":{"persona_casting":9,"passline_scene":9,"three_stage":9,"workflow":9,"scoring_rubric":9,"prohibitions":9,"boundaries":9,"house_style":9},"weakest":"persona_casting","top_fixes":["RED·SILVER·BLUE 비평가의 GOLD형 '장면'이 약하다. 각 비평가에 실제 평가서 한 줄을 인용해 '이 문장은 합격, 이 문장은 인상 평가'로 판별하는 미니 장면을 1개씩 붙여 GOLD 수준의 관찰 가능성으로 끌어올린다.","워크플로우 5번 합격 판정에서 '분석 3인 평균'과 '3인 모두 9.5 이상'이 혼용된다. 평균인지 전원인지 한 기준으로 통일해 판정 로직을 명확히 한다.","점수 기준의 GOLD 체류도 9 항목('개발 영역 한 줄 확인 후 합의')과 8 항목('한 항목 되물은 뒤 합의')의 경계가 모호하다. 되묻기 횟수나 방어 신호 유무 같은 관찰 가능한 분기 기준을 추가한다."],"evidence":{"persona_casting":"BLACK(HR BP 15년차+ 구글 GRAD·OKR 톤), RED(성과관리 디렉터 20년차+ 단정), SILVER(보상·평가 설계 22년차+ 깐깐), BLUE(조직개발·코칭 16년차+ 무뚝뚝), GOLD(분기말 팀원) 모두 직업·연차·어휘·마무리 패턴이 박혔고 비평가 톤이 단정/깐깐/무뚝뚝으로 구분됨.","passline_scene":"GOLD가 '분기 말 목요일 오후 4시, 평가 면담에서 평가서를 읽고 강점에 끄덕이고 개발영역에 방어 안 하고 목표 하나에 합의'로 요일·시간·장소·행동·실제 어휘(맞아요/해볼게요)까지 구체적. 합격선이 '개발 목표 하나에 합의'로 관찰 가능.","three_stage":"근거·평가·다음단계 3단이 겹치지 않게 분해되고 각 단에 나쁜 예('커뮤니케이션이 좋다')와 좋은 예(3월 출시 지연 사건/주간회의 두 번 주재 목표)가 모두 붙음.","workflow":"intake a~f 6항목, (c) 관찰 사건 비면 BLACK 미시작 게이트, RED→SILVER→BLUE→GOLD 순서, 합격 판정 로직(분석 3인+GOLD 모두 9.5), 충돌 시 BLUE 우선, 최대 4라운드까지 명시.","scoring_rubric":"분석 3인 척도와 GOLD 체류도 척도가 각각 10~5단계로 정의되고 합격선 9.5와 판정 규칙(0.5 이상 낮으면 v2)이 일관됨.","prohibitions":"특화 금지 8개가 직접 인용 예시('성실하고 책임감이 강함', '리더십을 강화할 것' 등)로 측정 가능하고 공통 금지에 형용사 2개 이상·접속사 1회 이하·em dash 0회 등 정량 임계값 존재.","boundaries":"근태 기록·1on1(p22)·승진 추천서·해고 통보(p19)로 라우팅하고 위기 신호 시 HR·법무 전환, '그냥 빨리' 시 BLACK 단독까지 명확.","house_style":"fullPrompt 본문에 em dash 0회, 단정한 종결, 짧은 주술, 과장어 회피, 자연스러운 한국어 유지. '15년차+' 같은 + 표기는 라벨이라 문체 위반 아님."},"summary":"5색 캐스팅·3단 정의·intake 게이트·정량 금지·형제 카드 라우팅이 모두 단단히 채워진 9점대 운영 카드로, 비평가 장면 보강과 판정 로직 통일만 하면 9.5에 닿는다."},{"id":"p5","title":"뉴스레터","cat":"소셜미디어·글쓰기","overall":8.9,"scores":{"persona_casting":9,"passline_scene":9,"three_stage":9,"workflow":9,"scoring_rubric":9,"prohibitions":9,"boundaries":8,"house_style":9},"weakest":"boundaries","top_fixes":["'적용하지 않는 경우' 절에 인접 형제 카드 라우팅 한 줄 추가: 장문 단일 글은 블로그 카드로, 단발 짧은 게시물은 SNS 포스트 카드로 보낸다고 명시해 기능 중복을 차단한다.","3단 정의(사실·관점·시사점) 각 항목에 좋은 예/나쁜 예 한 줄씩 박아 판별 기준을 관찰 가능하게 만든다. 예: 시사점 좋은 예 '이번 주 미팅에서 가격 인상 카드를 먼저 꺼낸다' vs 나쁜 예 '시장 상황을 주시할 필요가 있다'.","RED·SILVER·BLUE 합격선에 GOLD 수준의 장면 디테일(시간·기기·행동)을 1개씩 더해 합격선 장면을 균질하게 만든다."],"evidence":{"persona_casting":"BLACK(에디터 15년차+ 데스크·그로스 출신), RED(데스크 기자 출신 시사 평론가, 단정), SILVER(매거진 에디팅 디렉터, 깐깐), BLUE(이메일 그로스 리드, 실무자 직설), GOLD(출근길 30대) 모두 직업·연차·톤·어휘·마무리 패턴까지 박혔고 비평가 톤 3종이 구분된다.","passline_scene":"GOLD 합격선이 월요일 7시 50분·지하철·5분 안에 읽고 한 코너 캡처해 동료에게 전송으로 관찰 가능하다. 다만 RED/SILVER/BLUE 합격선은 '슬랙에 옮겨 적는다·끝까지 스크롤·CTA 누른다'로 행동은 있으나 시간·장소 디테일은 GOLD만큼 박히지 않았다.","three_stage":"사실·관점·시사점 3단이 겹치지 않게 정의되고 각 단에 판별 기준(출처 한 줄·관점 하나·1인칭 행동)이 붙는다. 다만 좋은 예/나쁜 예 문장 샘플은 없어 판별이 추상에 가깝다.","workflow":"intake(a 관점·b 사실 후보 3~7개), 빈 경우 검색 채움, 회차 일관성 게이트, RED→SILVER→BLUE→GOLD 순서, 합격 판정 로직(분석3인+GOLD 9.5), 4라운드 한계까지 실행 가능하다. intake 항목이 a~b 2개로 다소 적다.","scoring_rubric":"분석 3인 척도와 GOLD 체류도 척도가 각각 정의되고 합격선 9.5와 판정 규칙(0.5 이상 미달 시 v2 질의), 시리즈 보정까지 내부 일관된다.","prohibitions":"번역투 0회·형용사 2개 이상 금지·접속사 1회 이하·인사말 직접 인용 금지·코너 편차 1.5배·대괄호 금지 등 정량 임계값과 직접 인용 예시가 측정 가능하다.","boundaries":"'적용하지 않는 경우'(단순 사실 검색·일정 계산·제목만 뽑기·그냥 빨리)는 명확하나, 인접 형제 카드(블로그·SNS 포스트 등)로의 라우팅이 명시되지 않아 기능 중복 회피가 약하다.","house_style":"본문에 em dash 0개, 단정한 ~다/~ㄴ다 종결, 과장어 회피, 짧은 주술을 지킨다. 카드 본문 자체가 자기 규칙을 위반하지 않는다."},"summary":"3단 정의·워크플로우·정량 금지·점수 척도가 모두 단단하게 맞물린 상위권 카드. aries","top_fixes":["'적용하지 않는 경우' 절에 인접 카드 라우팅 한 줄 추가: 이력서 전체 작성은 이력서 카드로, 짧은 SNS 바이오·자기소개는 해당 카드로 보낸다고 명시해 기능 중복을 차단한다.","분석 3인 합격선(특히 SILVER '후크가 있다')에 관찰 가능한 판별 기준을 넣는다. 예: 'About 첫 두 줄에 누구·무엇·왜 중 2개 이상이 명시되고 일반 형용사가 0개'.","점수 기준의 GOLD 체류도 10점과 9.5 합격선 경계를 본문·페르소나에서 동일 문구로 통일해 InMail 발송이 10인지 9.5인지의 미세 불일치를 제거한다."],"evidence":{"persona_casting":"BLACK 헤드헌터 17년차+, RED 22년차+, SILVER 20년차+, BLUE 카피라이터 18년차+로 직업·연차·어휘·마무리 패턴이 다 박혔고 단정·깐깐·무뚝뚝 톤이 구분된다.","passline_scene":"GOLD가 화요일 오후 3시·50개 프로필·30초·InMail까지 관찰 가능한 장면. 다만 분석 3인 합격선은 '후크가 있다'류 다소 정성적이라 만점은 아니다.","three_stage":"헤드라인·About·경력 3단이 겹치지 않고 분량·판별 기준(직책만이면 1단 비었다)과 나쁜 예가 붙어 있다.","workflow":"intake a~e, 평가 순서, 9.5 합격 로직, 4라운드 한계, '비면 BLACK은 시작하지 않는다' 게이트까지 실행 가능하다.","scoring_rubric":"분석 3인 척도와 GOLD 체류도 척도가 9.5 합격선과 일관. 다만 본문은 9.5, 페르소나 GOLD 발화는 InMail 발송을 10으로 둬 미세 중복.","prohibitions":"직접 인용 8개(CEO at X, Hi I'm, passionate results-driven 등)와 형용사 2개 이상·em dash 0회 등 정량 임계값으로 측정 가능.","boundaries":"'적용하지 않는 경우'는 명확하나 인접 형제 카드(이력서·자기소개·SNS 바이오 등)로의 라우팅 지정이 없어 기능 중복 방지 장치가 빠졌다.","house_style":"em dash 본문 0회, 단정한 종결, 짧은 주술 유지. Heidrick & Struggles의 '&'는 고유명사라 문제없음."},"summary":"5색 캐스팅·3단 정의·intake 게이트·정량 금지 규칙이 모두 탄탄한 고완성 카드. 인접 카드 라우팅과 분석 3인 합격선의 관찰 가능성만 보강하면 9.5에 닿는다."},{"id":"p14","title":"블로그","cat":"소셜미디어·글쓰기","overall":8.8,"scores":{"persona_casting":9,"passline_scene":8,"three_stage":9,"workflow":9,"scoring_rubric":9,"prohibitions":9,"boundaries":8,"house_style":9},"weakest":"passline_scene","top_fixes":["RED·SILVER·BLUE 합격선에도 GOLD 수준의 관찰 장면을 한 줄씩 박는다. 예: SILVER 합격선을 '결말 마지막 문장을 가리고 도입을 다시 읽어도 의미가 이어진다'처럼 행동으로 검증 가능한 형태로 바꾼다.","'적용하지 않는 경우'에 인접 형제 카드를 실명으로 라우팅한다. 예: '독립 출판 에세이는 에세이 카드로, 정기 구독 발행은 뉴스레터 카드로 보낸다'를 추가해 기능 중복을 차단한다.","3단 정의에 단별 좋은 예/나쁜 예 한 쌍씩(특히 도입의 주장 한 줄 좋은 예 1개, 나쁜 예 1개)을 직접 인용으로 박아 BLACK 판별 정확도를 올린다."],"evidence":{"persona_casting":"BLACK(일러스트레이터·작가 15년차, 하루키/이슬아 톤), RED(평론가 25년차, 차분), SILVER(잡지 에디터 22년차, 깐깐), BLUE(작가 30년차, 속내 드러냄), GOLD(목요일 밤 30대 독자) 모두 직업·연차·톤·어휘·마무리 패턴까지 박혀 있고 비평가 발화 톤이 서로 구분됨 '·'첫 줄 약속 점검'·'60% 발화' 등 관찰 가능. GOLD 행동 어휘가 5개 안팎으로 더 늘면 만점권.","three_stage":"어젠다·맥락 질문·다음 액션 3단이 겹침 없이 분해되고 각 단에 판별 기준(첫 줄 약속, 발화 60%, 행동·시점·확인)이 붙음. 명시적 좋은 예/나쁜 예 대비는 금지 섹션에만 있고 3단 정의 안에는 나쁜 예가 약함.","workflow":"intake a~e, (b)(c) 비면 BLACK 미시작 게이트, RED→SILVER→GOLD 순서, 합격 판정 로직, 4라운드 한계, 충돌 시 RED 우선까지 명확. 실제 실행 가능.","scoring_rubric":"분석 3인 척도(10~7)와 GOLD 체류도 척도가 각각 정의되고 합격선 9.5와 일관. 다만 본문 목적은 9.5인데 GOLD 체류도 9.5 '합격선'과 9 '진행 매끄러움' 사이 의미 경계가 다소 모호하고, '0.5점 이상 낮으면 v2' 규칙과 척도 눈금(8=v2후보)이 미세하게 어긋남.","prohibitions":"직접 인용 8개(잘했어요·부족합니다·다음에 또 얘기해보죠·주말 잘 보내셨어요 등)와 정량 임계값(형용사 2개 금지, em dash 0, 발화 70% 초과 금지, 안건 5개 이상 금지)으로 측정 가능.","boundaries":"'적용하지 않는 경우'(징계·종료 단발, 신입 온보딩, 빨리 모드)가 명확하고 피드백 서면 모드로 분기. 다만 인접 형제 카드명으로 라우팅하지 않고 모드 분기로만 처리해 형제 카드 중복 회피 신호는 약함.","house_style":"em dash 0회 확인. 단정한 종결, 짧은 주술, '~할 수 있다' 0회 자기 규율까지 본문이 직접 지킴. 과장어 없음. AI 냄새 방지 규칙도 본문에 내재."},"summary":"페르소나 캐스팅·intake 게이트·금지 임계값·문체 자기규율이 모두 촘촘한 상위권 카드. 점수 척도 내부 정합과 형제 카드 라우팅만 손보면 9.5권."},{"id":"p23","title":"보고서 (실무, 1페이지)","cat":"분석·보고서","overall":8.8,"scores":{"persona_casting":9,"passline_scene":9,"three_stage":9,"workflow":9,"scoring_rubric":8,"prohibitions":9,"boundaries":8,"house_style":9},"weakest":"scoring_rubric","top_fixes":["워크플로우 4단계의 '분석 3인 평균 보고'를 삭제하거나 '평균은 참고용, 합격 판정은 3인 개별 9.5 이상'으로 명시해 5단계 판정 로직과 일치시킨다.","'적용하지 않는 경우'의 '다섯 페이지 이상 상세 보고는 별도 카드'에 실제 형제 카드명·id(예: 보고서(상세))를 박아 라우팅을 구체화한다.","RED/SILVER/BLUE 합격선을 GOLD처럼 관찰 장면형으로 보강한다(예: SILVER '결재판에서 결론→데이터 화살표를 손가락으로 짚어 끊김 없이 따라간다')."],"evidence":{"persona_casting":"BLACK 15년차 베인·맥킨지 1페이저, RED 어드바이저 20년차, SILVER 컨설팅 매니저 18년차, BLUE 슬라이드 디자이너 16년차, GOLD CEO까지 직업·연차·어휘·마무리·톤(단정·깐깐·무뚝뚝)이 모두 구분된다. 거의 결함 없음.","passline_scene":"GOLD '월요일 9시 30분, 이사회 직전 5분, 다음 안건 9시 40분, 30초 안에 사인'까지 시간·장소·행동이 박혔다. RED/SILVER/BLUE 합격선도 인용 가능 형태. 다만 비평가 합격선은 장면보다 판정 기준 문장에 가깝다.","three_stage":"결론·근거·다음 액션 3단이 겹침 없이 분해되고 각 단에 좋은 예('ㅇㅇ를 ~까지 ~하자')·나쁜 예(명사형 헤드라인 금지, 떠밀기 금지)와 정량 기준(1/3 이내)이 붙는다.","workflow":"intake (a)~(e), (a)(b)(c) 비면 BLACK 미시작 게이트, RED→SILVER→BLUE→GOLD 순서, 합격 판정 로직, 4라운드 한계까지 실행 가능. 충돌 시 RED 우선 규칙도 명시.","scoring_rubric":"분석 3인 척도와 GOLD 체류도 척도가 분리 정의되고 9.5 합격선과 일관된다. 다만 분석 3인 '평균' 보고(4단계)와 합격 판정의 '3인 모두 9.5 이상'(5단계)이 혼용돼 평균 vs 개별 기준이 미세하게 어긋난다.","prohibitions":"직접 인용 금지 8개('검토가 필요합니다', '배경부터 말씀드리면' 등)와 정량 임계값(형용사 2개 이상 금지, em dash 0회, 같은 길이 5줄 0회)이 측정 가능하다.","boundaries":"단순 사실 요약·5페이지 이상 상세 보고를 별도 카드로 라우팅하고 '그냥 빨리' 예외도 둔다. 다만 '별도 카드'의 카드명·id를 명시하지 않아 라우팅이 추상적이다.","house_style":"본문 종결 단정형, 과장어 없음, 짧은 주술, em dash 0회. 자연스러운 한국어. 결함 거의 없음."},"summary":"3단 정의·페르소나 캐스팅·intake 게이트·정량 금지가 모두 탄탄한 상위권 카드. 채점 로직의 평균 vs 개별 기준 혼용과 형제 카드 라우팅 미명시만 손보면 9.5에 닿는다."},{"id":"p25","title":"기획안·제안서","cat":"의사결정·전략","overall":8.8,"scores":{"persona_casting":9,"passline_scene":8,"three_stage":9,"workflow":9,"scoring_rubric":9,"prohibitions":9,"boundaries":8,"house_style":9},"weakest":"passline_scene","top_fixes":["RED·SILVER·BLUE 합격선을 GOLD처럼 물리 장면화한다. 예: RED '임원이 첫 줄만 읽고 옆 사람에게 한 문장으로 재설명한다', SILVER '디렉터가 4단을 손가락으로 짚으며 끊김 없이 따라 읽는다'로 바꿔 관찰 가능성을 올린다.","'적용하지 않는 경우'에 인접 형제 카드명을 명시해 라우팅한다. 예: '단순 보고는 보고서 카드로, 정보 전달 메모는 사내 공지 카드로 보낸다'를 추가해 기능 중복을 차단한다.","GOLD 체류도 척도의 '9=한 번 더 봄'과 '8 이하=재기획' 사이 경계 행동을 한 줄 장면으로 보강해 채점자 간 편차를 줄인다."],"evidence":{"persona_casting":"5색 모두 직업·연차·톤·어휘·마무리 패턴이 박혀 있다. BLACK 사업기획 16년차+, RED 사업개발 임원 20년차+(단정), SILVER 컨설팅 디렉터 18년차+(깐깐), BLUE 운영 매니저 15년차+(실무자 직설), GOLD 결재 임원. 비평가 톤 3종이 명시적으로 구분된다.","passline_scene":"GOLD는 '수요일 오후 3시, 회의 사이 5분에 결재' 등 요일·시간·행동·어휘(그래서·결재·사인)가 구체적이다. 다만 분석 3인 합격선('한 줄 요약이 임원 머리에 남는다','사슬이 끊기지 않는다')은 GOLD만큼 관찰 가능한 물리 장면이 아니라 다소 추상적이다.","three_stage":"문제·해결안·기대효과·필요 자원 4단으로 분해되고 각 단에 정량 예시('전환율 1.2%, 업계 평균 3.0%')와 판별 기준('옵션이 하나면 선언이다')이 붙는다. 단 간 겹침이 없다.","workflow":"intake a~e가 명시되고, 빈 칸이면 BLACK이 시작하지 않는 게이트, RED→SILVER→BLUE→GOLD 순서, 9.5 합격 판정 로직, 4라운드 한계, 2라운드 9.0 이하 시 적합성 경고까지 실행 가능하게 박혀 있다.","scoring_rubric":"분석 3인 척도(10/9.5/9/8/7)와 GOLD 체류도 척도(10/9.5/9/8)가 따로 정의되고 합격선 9.5 및 '0.5 이상 낮으면 v2' 판정과 일관된다.","prohibitions":"정량 임계값(em dash 0회, '~할 수 있다' 0회, 접속사 한 단락 1회 이하)과 직접 인용 6개('비용은 협의','리스크는 ence":{"persona_casting":"BLACK 전략 17년차+(Amazon/Bezos 톤), RED 시니어 매니저 22년차+(단정), SILVER 컨설팅 디렉터 20년차+(깐깐), BLUE 에디터·라이터 18년차+(무뚝뚝), GOLD 임원 5인까지 직업·연차·톤·어휘·마무리 패턴이 모두 박혀 있고 비평가 톤이 서로 구분된다. 거의 결함 없음.","passline_scene":"GOLD가 '수요일 오전 9시, 회의실, 임원 5인, 첫 30분 침묵 독해 후 첫 질문'으로 요일·시간·장소·행동까지 구체적. 각 비평가도 인용·차원 지지 등 관찰 가능한 9.7 장면 보유.","three_stage":"산출물이 문제·접근·근거·반대·결정 요청 5단으로 명시 분해되고 각 단에 판별 기준(단언형/의문형 금지, 출처, 반대 부재=fail, 옵션 둘 이상)이 붙는다. 3단이 아닌 5단 구조를 명시했고 정합적.","workflow":"intake a~e, RED→SILVER→BLUE→GOLD 순서, 9.7 합격 판정 로직, 0.3 게이트, 빈 칸이면 BLACK이 다시 묻는 게이트, 최대 4라운드까지 실행 가능. 견고함.","scoring_rubric":"분석 3인 척도와 GOLD 체류도 척도가 9.7 합격선과 일관되나, 합격 판정에서 '분석 3인 평균'(4번)과 '분석 3인 모두 9.7'(5번)이 혼재해 평균인지 전원인지 기준이 한 줄 안에서 어긋난다. 이 모호성이 감점 요인.","prohibitions":"내러티브 메모 특화 직접 인용 8개('아래 표 참고', '추가 검토가 필요하다' 등)와 정량 임계값(em dash 0회, 형용사 어휘 금지, 접속사 1회 이하)으로 측정 가능. 구체적.","boundaries":"'단순 결재 보고·내부 회람 메모'를 제외한다고 명시했으나, 인접 형제 카드(예: 일반 보고서·임원 브리핑 카드)로 라우팅하는 지시가 없어 기능 중복 회피가 약하다. 어디로 보내라는 경로가 빠졌다.","house_style":"fullPrompt 내 em dash는 'em dash(—, –) 0회' 규칙을 설명하는 인용 맥락에만 등장하고 본문 문장은 단정 종결·짧은 주술·과장어 회피를 지킨다. 자연스러운 한국어."},"summary":"5단 정의·intake 게이트·8개 직접 인용 금지·서로 구분되는 비평가 톤까지 갖춘 강한 카드로, 형제 카드 라우팅 부재와 합격 판정 로직의 평균/전원 혼재만 정리하면 9.5에 닿는다."},{"id":"p43","title":"영업 덱·피치덱","cat":"외부 커뮤니케이션","overall":8.6,"scores":{"persona_casting":9,"passline_scene":8,"three_stage":9,"workflow":9,"scoring_rubric":9,"prohibitions":9,"boundaries":7,"house_style":9},"weakest":"boundaries","top_fixes":["'적용하지 않는 경우' 절에 인접 카드 라우팅 한 줄 추가: 단순 회사 소개는 '회사 소개서' 카드로, IR·재무 보고는 'IR 보고서' 카드로 넘긴다는 명시적 지시를 넣어 기능 중복을 막는다.","RED·SILVER·BLUE 합격선을 GOLD 수준의 관찰 가능 장면으로 보강: 예) RED를 '첫 5장 넘기다 6장째에서 손 멈추고 차별성 한 줄을 소리 내 읽는다'처럼 행동·장소를 박는다.","intake 게이트에서 (e) 자금 사용처를 제외한 이유를 한 줄 명시하거나, CTA 단이 자금 사용처를 요구하므로 (e)도 게이트에 포함시켜 워크플로우와 4단 정의의 일관성을 맞춘다."],"evidence":{"persona_casting":"5색 모두 직업·연차·어휘·마무리 패턴 박힘(BLACK IR 디렉터 16년차, RED VC 20년차, SILVER 피치덱 코치 18년차, BLUE 데이터 비주얼라이저, GOLD VC 파트너). 톤 라벨도 단정·깐깐·회의적으로 구분됨.","passline_scene":"GOLD에 화요일 오후·덱 50개·5분·실제 어휘(미팅 다시·패스 kflow":"intake a~d, 빈 칸 재질문 게이트, RED→SILVER→BLUE→GOLD 순서, 분석3인+GOLD 9.5 합격 로직, 최대 4라운드, SILVER 2라운드 후 9.0 이하면 회의 결론 부족 통지까지 실행 가능.","scoring_rubric":"분석3인 10/9.5/9/8/7과 GOLD 체류도 10/9.5/9/8 척도 정의됨. 다만 본문 합격선은 9.5인데 subhead/페르소나 캐스팅과 korean 스킬의 9.7 관행 간 혼재 우려 없이 9.5로 일관. 분석3인 평균과 개별 0.5 룰의 관계가 '평균'과 '어느 하나라도'로 미세하게 이중 정의됨.","prohibitions":"회의록 특화 직접 인용 6개('긍정적으로 검토','빠른 시일 내에','관련 부서 협의','참석자 일동 동의','활발한 토론','추후 재논의')와 정량 임계값(em dash 0, 형용사 어휘 자체 금지, 접속사 단락 1회 이하) 측정 가능.","boundaries":"'단순 미팅 메모, 1:1 면담 기록'을 적용 제외로 명시하나 인접 형제 카드명으로의 라우팅이 없어 어느 카드로 보낼지 미지정. '그냥 빨리'면 BLACK 단독 실행만 안내.","house_style":"본문 em dash는 금지 규칙 인용 맥락에서만 등장(—,–)하고 실제 문장 종결은 단정형, 주술 짧음, 과장어 없음. 자연스러운 한국어 유지."},"summary":"회의록을 결정·이유·액션·담당 4단으로 분해하고 인텍 게이트·정량 금지·직접 인용 6개까지 갖춘 실행성 높은 카드. 형제 카드 라우팅 부재와 일부 비평가 합격선의 장면성 부족이 9.5로 가는 마지막 빈자리다."},{"id":"p42","title":"강의 자료 (덱+스크립트)","cat":"외부 커뮤니케이션","overall":8.5,"scores":{"persona_casting":9,"passline_scene":8,"three_stage":9,"workflow":9,"scoring_rubric":9,"prohibitions":9,"boundaries":6,"house_style":9},"weakest":"boundaries","top_fixes":["'적용하지 않는 경우' 절에 형제 카드 라우팅을 명시한다. 예: 슬라이드만 필요하면 PPT 생성 카드로, 사내 공지성 발표면 사내 공지 카드로 넘긴다고 한 줄씩 적는다.","RED·SILVER·BLUE 합격선을 GOLD처럼 관찰 가능한 장면형으로 보강한다. 예: RED는 '강의 후 청중 메모장에 동사형 한 줄이 남는다'처럼 결과 장면으로 다시 쓴다.","intake (d) 실습 도구 미가용 시 분기(워크북 없으면 구두 질문형으로 대체)를 워크플로우에 한 줄 추가해 (d)~(e) 공란 처리 규칙을 명확히 한다."],"evidence":{"persona_casting":"5색 모두 직업·연차·톤(차분/깐깐/무뚝뚝)·어휘·마무리 패턴이 구체적이고 비평가 톤이 서로 구분된다.","passline_scene":"GOLD는 평일 저녁 7시·직장인·실제 어휘(이건 알아둬야겠네·다음 주 해보자)로 박혀 있으나 RED/SILVER/BLUE 합격선은 장면이 아니라 규칙 문장(동사형 한 줄, 1:1 정렬 등)이라 관찰 장면성이 약하다.","three_stage":"학습 목표·핵심 개념·실습 3단이 겹치지 않게 분해되고 각 단에 좋은 예/나쁜 예(동사형 vs 이해한다 금지, 옆 사람과 1분 적기 등) 판별 기준이 붙는다.","workflow":"intake a~e, (a)~(c) 비면 BLACK 미시작 게이트, 평가 순서, 9.5 합격 판정 로직, 4라운드 한계까지 실제 실행 가능하다.","scoring_rubric":"분석 3인 척도와 GOLD 체류도 척도가 각각 정의되고 9.5 합격선·판정 규칙과 일관된다.","prohibitions":"직접 인용 8개 + 정량 임계값(형용사 2개 금지, em dash 0회, 분당 150자 초과 금지)으로 측정 가능하다.","boundaries":"적용 제외(단순 안내 발표·사내 공지, 그냥 빨리)는 있으나 인접 형제 카드로 scene":8,"three_stage":9,"workflow":9,"scoring_rubric":8,"prohibitions":9,"boundaries":7,"house_style":9},"weakest":"boundaries","top_fixes":["'적용하지 않는 경우' 섹션에 인접 형제 카드 라우팅을 명시한다. 예: 단순 표·피벗은 '엑셀 표 정리' 카드로, 임원용 KPI 시각화는 '대시보드' 카드로, 숫자 없는 재무 서술은 '재무 보고서' 카드로 보낸다는 한 줄을 추가한다.","RED·SILVER·BLUE 합격선을 산출물 상태 서술에서 관찰 가능한 발화 장면으로 바꾼다. 예: SILVER가 'F2를 눌러 임의의 출력 셀에서 가정까지 두 번 안에 도달하는지 직접 추적하는' 행동 장면으로 기술한다.","워크플로우 1번 게이트를 '(a)~(d)'에서 '(a)~(e)'로 확장해 검증 규칙 리스트(e)가 비면 BLACK이 시작하지 않도록 검증 시트 누락 위험을 입구에서 막는다."],"evidence":{"persona_casting":"BLACK(CFA 모델러 15년차+, Wall Street Prep 톤), RED(IB Associate 18년차+), SILVER(모델 감수자 20년차+), BLUE(데이터 검증 매니저 14년차+), GOLD(사내 CFO) 모두 직업·연차·어휘·마무리 패턴이 박혔고 톤(회의적·깐깐·무뚝뚝)이 구분된다. 거의 결함 없음.","passline_scene":"GOLD 합격선 '가정 셀 두 개 바꿔 시나리오 즉시 비교'는 관찰 가능하나, 분기 마지막 주 외 요일·시간·구체 발화 장면이 비평가 합격선엔 약하다. RED/SILVER/BLUE 합격선은 산출물 상태 기술이지 장면이 아니다.","three_stage":"입력·로직·산출·민감도 4단으로 겹침 없이 분해되고 각 단에 판별 기준(색 코딩, 두 단계 F2 추적, 한 페이지 KPI, 정합성 OK/NG)이 붙는다. 3단 대신 명시적 4단 구조로 명확.","workflow":"intake (a)~(e), 게이트 '(a)~(d) 하나라도 비면 BLACK 시작 안 함', 평가 순서, 합격 판정(3인 9.5+GOLD 9.5), 충돌 시 BLUE 우선, 4라운드 한계까지 실행 가능. (e) 검증 규칙이 게이트에서 빠진 점만 미세 흠.","scoring_rubric":"분석 3인 척도와 GOLD 체류도 척도가 각각 정의되고 합격선 9.5와 일관된다. 다만 fullPrompt는 9.5인데 black 필드/목적엔 9.5만, korean 계열의 9.7 같은 상향 합격선은 없어 단일 9.5로 일관. 척도 구간 라벨이 다소 압축적.","prohibitions":"엑셀 특화 직접 인용 금지 8개(하드코딩, Sheet1, 검증 시트 부재, 순환 참조 등)와 공통 정량 임계값(형용사 2개 금지, em dash 0회 자동 fail)이 측정 가능하게 박혔다.","boundaries":"'적용하지 않는 경우'로 단순 데이터 정리·피벗, '그냥 빨리' 시 BLACK 단독은 있으나, 인접 형제 카드(예: 일반 엑셀·대시보드·재무 보고서 카드)로의 명시적 라우팅이 없어 기능 중복 회피가 약하다.","house_style":"em dash 미사용, 단정한 종결, 짧은 주술, 과장어 없음. CLAUDE.md 문체 정합. fullPrompt 내 em dash 0개 확인."},"summary":"입력·로직·산출·민감도 4단과 8개 직접 인용 금지가 탄탄한 실행형 카드. 페르소나 캐스팅과 워크플로우 게이트는 강하나, 형제 카드 라우팅 부재와 비평가 합격선의 장면성 부족이 9.5의 마지막 장벽이다."},{"id":"p49","title":"계약서 검토","cat":"법무 검토·규제 대응","overall":8.5,"scores":{"persona_casting":9,"passline_scene":8,"three_stage":9,"workflow":9,"scoring_rubric":8,"prohibitions":9,"boundaries":7,"house_style":9},"weakest  단에 좋은 예/나쁜 예가 단별로 직접 배치되지 않고 금지 절로 분산됨.","workflow":"intake a~e·게이트·평가 순서·9.7 판정·0.5 규칙·4라운드·감사 파트너 동반까지 실행 가능하게 명세됨.","scoring_rubric":"분석 3인 척도와 GOLD 체류도 척도가 각각 정의되고 9.7 합격선·0.5 재실행 규칙과 일관됨.","prohibitions":"직접 인용 8개와 정량 임계값(형용사 2개 이상 금지, em dash 0회)으로 측정 가능.","boundaries":"'단순 통제 점검 체크리스트' 제외와 감사 파트너 서명 요건은 있으나, 인접 형제 카드로의 라우팅이 없어 어디로 보낼지 미지정.","house_style":"fullPrompt에 em dash 없음(중점·마침표 사용), 짧은 주술·단정 종결·과장어 회피 준수."},"summary":"9.7 영역 카드로서 페르소나·워크플로우·금지·문체가 고르게 탄탄하나, 형제 카드 라우팅 부재가 유일한 약점이다."},{"id":"p59","title":"브랜드 가이드라인","cat":"마케팅","overall":8.4,"scores":{"persona_casting":8,"passline_scene":7,"three_stage":9,"workflow":9,"scoring_rubric":8,"prohibitions":9,"boundaries":8,"house_style":9},"weakest":"passline_scene","top_fixes":["RED·SILVER·BLUE 합격선을 체크리스트형에서 관찰 가능한 장면으로 바꾼다. 예: RED 합격선에 '경쟁 브랜드 3곳 가이드와 나란히 놓고 본질 한 줄만 가렸을 때 어느 브랜드인지 맞힐 수 있다' 같은 비교 장면을 박는다.","GOLD 페르소나에 직업 연차·구체 상황을 보강한다. '입사 3일차 신입 디자이너가 OOH 시안 마감 2시간 전 색상 HEX를 가이드에서 찾아 바로 적용' 같은 실제 행동 장면을 추가한다.","boundaries에서 '일회성 캠페인 톤'이 라우팅되는 형제 카드명을 명시해 p56처럼 목적지를 박는다."],"evidence":{"persona_casting":"BLACK 17년차 Pentagram·우아한형제들 톤, RED 22년차/SILVER 18년차/BLUE 16년차로 연차·직업·어휘·마무리 패턴·발화톤(단정·깐깐·무뚝뚝) 모두 구분. GOLD만 직업 캐스팅이 '신입 디자이너·카피라이터'로 다소 일반적.","passline_scene":"GOLD는 '첫 출근날 오전 10시, 회의 직전, 페이지당 30초'로 구체적이나 RED·SILVER·BLUE 합격선은 '본질 한 줄 구분/셋·셋·셋 균형/예시 쌍 한 개'로 장소·시간 없는 판정 기준에 가깝다. 분석가 3인의 합격선이 장면이 아닌 체크리스트형.","three_stage":"톤·시각·금지 3단이 겹치지 않게 분해되고, 각 단에 정의 방식(동사·명사/HEX·폰트·여백 수치/직접 인용)과 좋은예·나쁜예가 박혀 있다.","workflow":"intake a~e 명시, (b)·(e) 비면 시작 안 함 게이트, RED→SILVER→BLUE→GOLD 순서, 합격 로직, 충돌 시 BLUE 우선, 4라운드 한계까지 실행 가능하게 구체적.","scoring_rubric":"분석가 3인 척도와 GOLD 체류도 척도가 각각 정의되고 9.5 합격선과 일관. 다만 BLACK fullPrompt는 9.5 합격선인데 subhead/black 필드 외 명시는 일관. GOLD 체류도 9.5 기준과 본문 '한 항목 재질의=9' 매핑이 약간 거칠다.","prohibitions":"직접 인용 8개 금지 예시('따뜻하고 신뢰감 있는', '지양·주의', 보이스 5개 이상 등)와 정량 임계값(형용사 2개 이상 금지, em dash 0회, 같은 길이 5줄 0회)로 측정 가능.","boundaries":"'단순 로고 안내·일회성 캠페인 톤' 제외, 카피·슬로건 단발은 p56으로 라우팅, '그냥 빨리' 시 BLACK 단독. 형제 카드 라우팅 명확. 다만 '일회성 캠페인 톤'이 어느 카드로 가는지는 미명시.","house_style":"본문 em dash 0회(em dash는 금지 규칙 표기용으로만 등장), 짧은 주술·단정 종결·과장어 회피 준수. 자연스러운 한국어 유지."},"summary":"3단 정의·워크플로우·금지 규칙이 탄탄한 상위권 카드. 분석가 3인의 합격선이 장면보다 체크리스트에 가깝고 GOLD 직업 캐스팅이 일반적인 것이 9.5로 가는 마지막 빈자리다."},{"id":"p68","title":"리더 심리 상담","cat":"커리어·상담","overall":8.4,"scores":{"persona_casting":9,"passline_scene":8,"three_stage":8,"workflow":9,"scoring_rubric":7,"prohibitions":8,"boundaries":9,"house_style":9},"weakest":"scoring_rubric","top_fixes":["점수 기준 섹션에 RED·SILVER·GOLD 분석 3인용 1~5 척도와 GOLD 체류도 척도를 수치로 정의하고, 9.5 합격선과의 환산 규칙을 한 줄로 명시한다.","GOLD 합격선 '무게를 한 줄로 잡음'에 관찰 가능한 실제 장면 앵커(예: 월요일 아침 출근 전 메모장에 한 줄로 적어보는 자리)를 추가한다.","3단 정의 각 단에 좋은 예/나쁜 예 한 쌍씩 대조 문장을 붙이고, 점수 기준의 '의미를 갈음'을 '의미를 가늠'으로 교정한다."],"evidence":{"persona_casting":"5색 모두 직업·연차(임상16년·리더22년·코칭18년·헤드헌터20년)·진입조건·말투형(\"~하셨을 거예요\"·\"같은 밤을 보냈어요\"·\"제3자가 보면\"·\"시장에서 보면\")·마무리 패턴까지 박혀 구분이 선명. 톤 결(BLUE 따뜻·SILVER 동료거리·RED 차분·GOLD 직설)도 명시.","passline_scene":"각 페르소나 합격선이 관찰형(\"맞아요 하고 한 호흡 내쉼\"·\"같은 밤 보낸 누군가 감각\"·\"무게를 한 줄로 잡음\")으로 구체적이나, GOLD 합격선에 요일·시간·장소 같은 실제 장면 앵커가 없고 추상 감각에 머문다.","three_stage":"현재 감정·맥락·다음 한 걸음 3단이 페르소나 매핑과 함께 분해됨. 다만 각 단에 좋은 예/나쁜 예 대조가 본문에 명시되지 않아 판별이 진입조건 서술에 의존한다.","workflow":"intake (a)~(e)와 위기신호 게이트, 순서(BLUE→SILVER→RED→GOLD), 최소 캐스트(BLACK+1), 동조 금지, 위기 시 1393 전환까지 실제로 돌릴 수 있게 구체적. \"그냥 빨리\" 시 BLACK 단독 게이트도 있음.","scoring_rubric":"상담 영역 특성상 정량 채점을 의도적으로 약화했고 9.5 기준 2개와 fail 조건을 둠. 그러나 분석 3인(RED·SILVER·GOLD) 척도와 GOLD 체류도 척도가 수치로 정의되지 않아 다른 카드의 9.5/9.7 루브릭과 정합성이 약하다.","prohibitions":"직접 인용 금지 10개와 정량 임계값(em dash 0회, 형용사 2개 이상 금지, 평어 0회)이 측정 가능하게 명시. \"리더는 외로운 자리\"·\"괜찮아질 거예요\" 같은 인용 예시도 박힘.","boundaries":"위기·임상치료·약물은 1393/정신과 전문의로 라우팅, 조직·인사 결정 대행 거부, \"그냥 빨리\"는 BLACK 단독으로 분기해 경계가 명확.","house_style":"em dash 0, 짧은 주술, 정중한 구어체로 문체 지침 일관. \"의미를 갈음\"은 \"가늠\" 오타로 보이는 1건이 옥에 티."},"summary":"상담 영역에 맞춰 캐스팅·진입조건·금지·경계를 정교하게 설계한 상위권 카드. 정량 채점을 의도적으로 약화한 탓에 분석 3인 척도 정합성만 보강하면 9.5에 도달한다."},{"id":"p30","title":"PRD (제품요구사항문서) 작성","cat":"의사결정·전략","overall":8.3,"scores":{"persona_casting":8,"passline_scene":7,"three_stage":9,"workflow":9,"scoring_rubric":8,"prohibitions":9,"boundaries":7,"house_style":9},"weakest":"passline_scene","top_fixes":["RED·SILVER·BLUE 합격선에도 GOLD처럼 관찰가능한 장면을 한 줄씩 박는다. 예: RED 합격선을 '사용자 리서처가 인터뷰 5건 인용을 손가락으로 짚으며 가설 아님을 확인한다'식으로 시간·행동을 추가.","'적용하지 않는 경우'에 인접 형제 카드로의 라우팅을 명시한다. 예: '시각·UI 흐름 중심이면 기능명세 카드로, 분기별 우선순위면 로드맵 카드로 보낸다'를 추가해 기능 중복을 차단.","BLUE를 '공감'축으로 재정렬하거나, 엔지니어 캐스팅을 유지하려면 색 라벨을 측정·실현가능성 관점으로 명시해 SILVER와의 역할 중복 인상을 줄인다."],"evidence":{"persona_casting":"BLACK 15년차 Stripe/Notion/Linear, RED 사용자리서처 18년차, SILVER 제품디렉터 20년차, BLUE 시니어엔지니어 16년차로 직업·연차·어휘·마무리패턴 모두 구체. 톤도 회의적·깐깐·실무자직설로 구분. 다만 BLUE를 '공감'축에 엔지니어로 캐스팅한 점은 색 정의와 다소 어긋난다(측정·기술 관점이라 사실상 SILVER 계열).","passline_scene":"GOLD가 '월요일 오전 9시 회의실 풀스택 엔지니어가 PRD를 펼친다'로 요일·시간·장소·행동까지 박혀 있어 양호. 단 분석 3인의 합격선은 '인터뷰로 검증', 'P0/P1/P2 명확'처럼 판별기준형이라 GOLD만큼의 관찰가능한 장면은 아니다.","three_stage":"무엇·왜·범위·성공지표 4단으로 명시 분해되고 각 단에 좋은 예(\"DAU 5% 증가, 출시 후 4주\")와 판별 기준이 붙는다. 겹침 없음.","workflow":"intake a~e, 빈칸 게이트('하나라도 비면 BLACK은 작업을 시작하지 않는다'), RED→SILVER→BLUE→GOLD 순서, 9.5 판정 로직, 4라운드 한계, RED 2라운드 후 9.0 이하 신호까지 실행 가능.","scoring_rubric":"분석 3인 척도(10/9.5/9/8/7)와 GOLD 체류도 척도가 분리 정의되고 합격선 9.5와 정합. 다만 목적 본문은 9.5, 일부 형제 카드 대비 9.7 미사용으로 카드 내 일관성은 유지되나 척도 구간 설명이 다소 짧다.","prohibitions":"직접 인용 6개(\"좋은 UX를 제공한다\" 등)와 정량 임계값(em dash 0회, '~할 수 있다' 0회, 형용사 어휘 금지, 접속사 1회 이하)으로 측정 가능.","boundaries":"'단순 버그수정·단발 어드혹·그냥 빨리'는 BLACK 단독으로 분기해 적용 제외를 명시. 다만 인접 형제 카드(예: 기획서·기능명세·로드맵)로의 라우팅 지정이 없어 기능 중복 방지가 약하다.","house_style":"본문에 em dash 사용처 없음(em dash는 금지 규칙 인용으로만 등장). 단정한 종결, 짧은 주술, 과장어 회피 양호. 자연스러운 한국어."},"summary":"4단 정의·워크플로우·금지 규칙이 탄탄한 실행 가능한 PRD 카드. 분석 3인의 합격선 장면화와 형제 카드 라우팅만 보강하면 9.5에 닿는다."},{"id":"p32","title":"OKR·KPI 정기 리포트","cat":"분석·보고서","overall":8.3,"scores":{"persona_casting":8,"passline_scene":8,"three_stage":9,"workflow":9,"scoring_rubric":8,"prohibitions":8,"boundaries":7,"house_style":9},"weakest":"boundaries","top_fixes":["'적용하지 않는 경우' 섹션에 인접 형제 카드 라우팅 한 줄 추가. 예: '단순 KPI 모니터링은 (주간 운영 대시보드 카드)로, 단발 성과 회고는 (분기 회고 카드)로 보낸다'를 명시해 기능 중복을 끊는다.","GOLD 페르소나에 임원 직무·연차 라벨을 한 줄 박아라(예: '사업부 총괄 임원 20년+'). 현재는 장면만 있고 캐스팅 라벨이 비어 다른 페르소나와 깊이가 어긋난다.","분석 3인 합격선을 GOLD처럼 관찰 장면으로 보강하라. 예: RED 합격선을 '리포트를 든 RED가 격차 행에서 손가락을 멈추고 원인 한 줄을 소리내 읽는다' 식으로 장면화하면 passline_scene이 9.5에 닿는다."],"evidence":{"persona_casting":"BLACK(People Ops 15년+/Lattice·15Five), RED(사업기획 18년+), SILVER(PMO 16년+), BLUE(운영 애널리스트 14년+) 직업·연차·어휘·마무리 패턴까지 구체. 비평가 톤(회의적·깐깐·무뚝뚝) 구분. GOLD가 임원으로 캐스팅되나 어휘만 있고 연차·직무 라벨은 장면에 녹아 약간 얕음.","passline_scene":"GOLD 합격선은 '분기 마지막 주 금요일 오후 4시·임원·5분에 다음 분기 우선순위'로 요일·시간·행동·어휘가 박혀 구체적. 다만 분석 3인 합격선은 '격차마다 원인 한 줄·표 한 장' 식 기준형이라 장면성은 GOLD에 비해 추상적.","three_stage":"4단(목표·진행률·블로커·다음 행동)이 겹치지 않게 분해되고 각 단에 측정 형태·세 칸 표·내부3분류·시점담당자 같은 판별 기준이 붙음. 좋은 예/나쁜 예 대비는 금지 섹션에 분산.","workflow":"intake a~e, RED→SILVER→BLUE→GOLD 순서, 9.5 게이트, 0.5 룰, 최대 4라운드, 빈칸 시 BLACK 미시작 게이트까지 실행 가능. 거의 결함 없음.","scoring_rubric":"분석 3인 척도(10/9.5/9/8/7)와 GOLD 체류도 척도가 정의되고 9.5 합격선·0.5 룰과 일관. GOLD 체류도 9.5 합격선 수치는 명시되나 '5분 안 우선순위'와 점수 매핑 연결은 다소 암묵적.","prohibitions":"em dash 0회·형용사 어휘 자체 금지·접속사 1회 이하 등 정량 임계값과 직접 인용 4개('노력하겠습니다','시장이~')로 측정 가능. 다만 '한 페이지에 OKR 두 개','비교군 부재'는 임계값 없이 상태 서술이라 일부 막연.","boundaries":"'적용하지 않는 경우'로 단순 데이터 추출·대시보드 캡처·'그냥 빨리'는 명시되나, 인접 형제 카드(일반 KPI 대시보드, 주간 운영 리포트 등)로의 라우팅이 없어 기능 중복 회피 장치가 부족.","house_style":"본문 em dash 사용 0회(금지 규칙으로만 등장), 단정한 종결, 과장어 없음, 짧은 주술. 자연스러운 한국어 유지. 거의 결함 없음."},"summary":"4단 정의·워크플로우·정량 금지가 탄탄한 상위권 운영 카드. 형제 카드 라우팅 부재와 GOLD 외 페르소나 장면성이 9.5를 가로막는 마지막 빈자리."},{"id":"p34","title":"투자 메모 (IC Memo)","cat":"의사결정·전략","overall":8.3,"scores":{"persona_casting":8,"passline_scene":8,"three_stage":8,"workflow":9,"scoring_rubric":8,"prohibitions":9,"boundaries":7,"house_style":9},"weakest":"boundaries","top_fixes":["'적용하지 않는 경우' 절에 인접 형제 카드 라우팅을 추가한다. 예: 단순 사업 보고서는 보고서 카드로, 시장 규모만 보는 산업 분석은 시장 분석 카드로, 거래 실사 체크리스트는 DD 카드로 보낸다고 명시.","분석 3인(RED·SILVER·BLUE) 각각의 합격선을 GOLD처럼 관찰 가능한 장면형으로 1줄씩 보강한다. 예: RED는 '첫 단락만 읽고 투자 결정·리스크·대응을 메모지에 받아적을 수 있는 상태'.","4단 정의 각 항목에 나쁜 예 1개씩을 직접 인용으로 붙인다. 예: 리스크 단의 나쁜 예 '시 드 9.0 이하 재인터뷰까지 실행 가능.","scoring_rubric":"분석 3인 척도(10/9.5/9/8/7)와 GOLD 체류도 척도(10/9.5/9/8)가 각각 정의되고 합격선 9.5와 일관. 다만 분석 3인 '평균'과 '모두 9.5 이상' 표현이 5번 항목에서 혼용돼 평균 기준인지 전원 기준인지 미세하게 모호.","prohibitions":"직접 인용 8개(답변하셨다, 이상입니다, 제 생각에는 등)+정량 임계값(em dash 0회, ~할 수 있다 0회, 형용사 어휘 금지, 접속사 1회 이하)으로 측정 가능. 강함.","boundaries":"'단순 메모·내부 회의록, 그냥 빨리는 BLACK 단독'만 명시. 인접 형제 카드(예: 일반 인터뷰 노트, 회의록 카드)로의 라우팅이 없어 기능 중복 회피 장치가 약하다. 어떤 카드로 보내라는 지시 부재.","house_style":"본문 em dash 0(오히려 금지 규칙으로 명시), 단정한 종결, 짧은 주술, 과장어 없음. CLAUDE.md 문체와 정합. 명사형 종결도 의도된 콜 노트 톤."},"summary":"intake 게이트·금지 규칙·문체 정합이 9점대로 단단한 실전형 카드. 형제 카드 라우팅 부재가 유일한 명확한 빈자리다."},{"id":"p40","title":"경영 진단 보고서","cat":"분석·보고서","overall":8.1,"scores":{"persona_casting":8,"passline_scene":6,"three_stage":9,"workflow":9,"scoring_rubric":8,"prohibitions":9,"boundaries":7,"house_style":9},"weakest":"passline_scene","top_fixes":["GOLD 합격선을 물리적 장면으로 고쳐라. 예: '화요일 오전 이사회 직전, 임원이 경영진 요약 한 페이지만 들고 와 첫 문단에 형광펜을 긋고 비서에게 권고안 일정을 잡으라고 말한다' 수준으로 요일·장소·행동·실제 발화를 박아라.","RED/SILVER 합격선의 '충격', '시사점에 닿는다' 같은 추상 판정을 관찰 가능한 반응으로 바꿔라. 예: RED는 '근본 원인 한 줄을 읽은 임원이 회의를 멈추고 해당 부서장을 호출한다'처럼.","'적용하지 않는 경우'에 형제 카드 라우팅을 추가하라. 단순 데이터 정리는 데이터 정리 카드로, 내부 회람 메모는 사내 메모/공지 카드로 보내라고 카드명을 지정해 기능 중복을 차단하라."],"evidence":{"persona_casting":"5색 모두 직업·연차(파트너 25년차+, 매니저 22년차+ 등)·어휘·마무리 패턴·비평가 톤(차분·깐깐·회의적) 분리됨. BLUE를 '공감'축에 데이터 검증 매니저로 캐스팅한 건 라벨과 역할이 다소 어긋나나 구체성은 충분.","passline_scene":"GOLD 합격선이 '클라이언트 임원이 경영진 요약 한 페이지를 5분에 본다'로 행동·시간은 있으나 요일·장소·물리적 장면이 없고 '권고 요청'이라는 결과 표현에 머문다. RED/SILVER 합격선('충격', '시사점에 닿음')은 관찰 가능한 장면이 아니라 추상 판정에 가깝다.","three_stage":"진단(현황)·원인(근본원인)·권고 3단이 겹치지 않게 분해되고 각 단에 판별 기준('표면적 원인 금지', '권고가 진단과 섞이면 자동 fail')과 나쁜 예가 붙음.","workflow":"intake a~e, RED→SILVER→BLUE→GOLD 순서, 빈칸 게이트('빈 칸 있으면 한 번 더 묻는다'), 합격 판정 로직(3인+GOLD 9.5), 최대 4라운드·2라운드 후 9.0 이하 재정의까지 실행 가능.","scoring_rubric":"분석 3인 척도(10/9.5/9/8/7)와 GOLD 체류도 척도가 별도 정의되고 합격선 9.5와 판정 규칙('0.5 이상 낮으면 v2')이 일관됨. 다만 본문 목적 서술의 '9.5'와 BLACK 분량 '10점 만점' 표현이 한 번 더 명시되면 더 깔끔.","prohibitions":"직접 인용 8개(\"데이터를 정리하면 다음과 같다\" 카드)로의 라우팅 지시가 없어 기능 중복 회피 장치가 약함.","house_style":"본문 종결이 단정하고 짧은 주술 위주, 과장어 없음, em dash 0회 명시 및 자동 fail 규칙 내장. 카드 본문 자체가 CLAUDE.md 문체를 지킴."},"summary":"3단 정의·워크플로우·금지 규칙은 9점대로 탄탄하나, GOLD 합격선 장면의 구체성과 SILVER/BLUE 시선 차별화가 9.7 영역 기준에서 빈자리로 남는다."}],"synthesis":{"common_weaknesses":[{"pattern":"분석 3인(RED·SILVER·BLUE) 합격선이 GOLD와 달리 '관찰 가능한 장면'이 아니라 추상 판정 조건·체크리스트로 적혀 있다. GOLD만 시간·장소·행동·발화가 박힌 장면이고 나머지 3인은 '충격을 준다', '시사점에 닿는다', '첫 단락에 청구취지' 같은 명제형이라, 채점자가 9.5와 9.0을 자로 가를 근거가 없다. passline_scene이 라이브러리에서 두 번째로 약한(8.1) 직접 원인이다.","why_it_matters":"합격선이 장면이 아니면 채점이 평가자 감각에 좌우돼 9.5 합격선 자체가 흔들린다. Roasting 엔진의 핵심 자산인 '재현 가능한 채점'이 무너진다.","affected_examples":["p61","p52","p40","p33","p37","p54","p51","p7","p14","p25"],"fix":"전 카드 공통 패치. 각 비평가 합격선을 '누가·언제·어디서·무엇을 인용/멈춤/넘김' 한 문장으로 다시 쓰는 템플릿을 만들어 일괄 적용한다. 예: RED='월요일 투자위 회의 첫 5분, 임원이 첫 줄만 읽고 옆 사람에게 한 문장으로 재설명한다.' GOLD 페르소나의 장면 해상도를 기준값으로 삼아 3인을 그 수준에 맞춘다."},{"pattern":"'적용하지 않는 경우' 절이 라우팅 대상 형제 카드명/id 없이 '별도 카드로', '다듬기 스킬로'처럼 선언만 되어 있어 인접 카드와 기능이 겹친다. boundaries가 평균 7.7로 8개 기준 중 최하위이고, 최하위 12개 카드 다수의 weakest가 boundaries다.","why_it_matters":"라우팅 목적지가 비면 65개 카드가 서로의 영역을 침범해 사용자가 어느 카드를 써야 할지 흔들린다. 카드가 늘수록 중복이 누적돼 라이브러리 전체의 식별성이 떨어진다.","affected_examples":["p3","p42","p74","p38","p55","p1","p2","p43","p47","p60"],"fix":"카드 간 라우팅 표를 1장 만들어 각 카드의 인접 형제 카드 id+제목+넘기는 조건을 한 줄씩 못박는다. '단순 X는 [p__ 카드], 장문 Y는 [p__ 카드]로 보낸다' 형태로 선언을 핸드오프로 바꾼다. 위기 대응(p3, boundaries 6), 강의(p42 6), 이미지(p74 6)부터 우선 적용."},{"pattern":"점수 판정 로직이 카드 안에서 충돌한다. 워크플로우 4번 '분석 3인 평균 보고'와 5번 '3인 전원 9.5/9.7 합격'이 혼용되고, '0.5점 이상 낮으면 v2' 룰과 척도 눈금(9.7/9.5/9.3)이 다른 단위로 적혀 9.4~9.6 구간 처리가 빈다. GOLD 체류도 척도와 분석 3인 척도의 같은 점수(8·9)가 서로 다른 처리를 가리킨다.","why_it_matters":"판정 규칙이 둘이면 같은 산출물이 채점자에 따라 합격도 v2도 될 수 있다. scoring_rubric 평균 8.3의 핵심 원인이자, 채점 시스템 신뢰도를 직접 깎는다.","affected_examples":["p23","p27","p54","p60","p35","p3","p44","p50","p56","p68"],"fix":"공통 채점 헤더를 표준화한다. (1)평균은 참고용, 합격 판정은 '분석 3인 + GOLD 전원 9.7 이상'으로 단일화. (2)0.5점 룰을 척도 숫자로 환산(9.7 기준 9.2 미만=v2)해 한 단위로 통일. (3)GOLD 체류도와 분석 3인 척도의 8·9·9.5 구간 의미를 한 줄 대조표로 묶는다. p68은 '갈음→가늠' 오타도 함께 교정."},{"pattern":"3단·4단 정의에 '좋은 예'만 있고 '나쁜 예'가 빠져 있어 BLACK이 경계선을 판별할 기준이 한쪽뿐이다. 일부 카드는 4단 정의와 본문 골격(5단 등)이 서로 다른 단 구조를 제시해 정의가 어긋난다.","why_it_matters":"나쁜 예가 없으면 BLACK이 '시장 상황을 주시할 필요', '관계자 여러분' 같은 무난한 실패 문장을 합격으로 넘긴다. three_stage 점수가 8로 떨어지는 카드의 공통 원인이고, 초안 품질의 하한을 낮춘다.","affected_examples":["p16","p28","p55","p5","p11","p12","p21","p22","p34"],"fix":"3·4단 정의의 모든 단에 좋은 예/나쁜 예를 직접 인용 한 쌍으로 박는 패치를 일괄 적용한다. 예: 시사점 좋은 예 '이번 미팅에서 가격 인상 카드를 먼저 꺼낸다' vs 나쁜 예 '시장 상황을 주시할 필요가 있다'. p28처럼 단 구조가 본문과 어긋나는 카드는 4단을 본문 골격으로 고정해 정의를 통일한다."},{"pattern":"비평가 4인이 같은 도메인·직업군·연차로 캐스팅돼 시야가 겹친다. 회계·재무 3인, 브랜드·카피 4인, 코치 계열 3인처럼 톤만 다르고 보는 축이 같아 페르소나 다양성이 명목에 그친다. 연차 위계가 역전돼(어소시에이트가 매니저보다 합격선 권위가 약해 보임) 발화 신뢰도가 흔들리는 카드도 있다.","why_it_matters":"비평가가 같은 곳을 보면 4색 하네스의 교차 검증이 작동하지 않아 한 관점의 사각이 그대로 통과한다. 5-Color Harness 정체성의 핵심 가치가 빈다.","affected_examples":["p33","p37","p52","p46","p30","p10","p72","p61","p67"],"fix":"비평가 캐스팅 점검표를 만들어 4인이 서로 다른 축(이성·현장 디테일·공감·실독자)을 직무로도 분리하게 강제한다. 예: p33은 BLUE를 IR 주니어/사외이사로, p52는 BLUE를 '인용 번호 오기'에만 한정해 SILVER와 분리. RED·SILVER 연차 근접 카드는 직무 어휘 차이를 더 벌리고, 위계 역전(p61)은 연차·역할을 정합시킨다."}],"priority_plan":[{"rank":1,"target":"전체 패턴","action":"분석 3인 합격선 장면화 패치를 전 카드에 일괄 적용한다. GOLD 페르소나 장면 해상도(누가·언제·어디서·무엇을)를 기준으로 RED·SILVER·BLUE 합격선을 명제형에서 장면형으로 다시 쓰는 공통 템플릿을 만들어 돌린다.","effort":"중간","expected_gain":"passline_scene 평균 8.1을 9 이상으로 끌어올려 전체 평균을 가장 크게 움직인다. passline_scene이 weakest인 카드가 최하위 12개 중 7개라 하위 카드가 동시에 올라간다."},{"rank":2,"target":"전체 패턴","action":"카드 간 라우팅 표(각 카드의 인접 형제 카드 id+제목+넘기는 조건)를 1장 만들고 모든 카드의 '적용하지 않는 경우' 절을 그 표의 한 줄로 교체한다.","effort":"중간","expected_gain":"가장 약한 기준 boundaries(7.7)를 직접 메운다. 라우팅 표는 한 번 만들면 신규 카드에도 재사용되는 운영 자산으로 남는다."},{"rank":3,"target":"전체 패턴","action":"공통 채점 헤더를 표준화한다. 합격 판정을 '전원 9.7' 단일 로직으로, 0.5점 룰을 척도 숫자로 환산, GOLD 체류도와 분석 3인 척도 대조표를 한 블록으로 묶어 전 카드 점수 기준 절에 붙인다.","effort":"낮음","expected_gain":"scoring_rubric 8.3을 9 수준으로 올리고, 채점 일관성이라는 시스템 신뢰도를 회복한다. 텍스트 블록 한 개를 복제 적용하므로 투입 대비 효과가 크다."},{"rank":4,"target":"전체 패턴","action":"3·4단 정의의 각 단에 좋은 예/나쁜 예 직접 인용 한 쌍을 박는 패치를 적용한다. 단 구조가 본문과 어긋나는 카드(p28 등)는 정의를 본문 골격에 통일한다.","effort":"중간","expected_gain":"three_stage 저점 카드(p16·p28·p55·p18)를 끌어올리고 BLACK 초안 품질 하한을 높여 라이브러리 전반의 바닥을 단단하게 한다."},{"rank":5,"target":"p3","action":"위기 대응 메시지의 boundaries(6)를 최우선 보강한다. 평시 사과·해명문은 보도자료 카드, 사내 위기 안내는 사내 공지 카드로 넘기는 라우팅을 명시하고, 8~9.2 구간 충돌 판정 규칙을 9.2 미만 단일 경계로 못박는다.","effort":"낮음","expected_gain":"리스크가 가장 큰 위기 대응 카드를 8.5에서 9 안팎으로 끌어올린다. 오용 시 손해가 큰 영역이라 효과 대비 중요도가 높다."},{"rank":6,"target":"p68","action":"리더 심리 상담의 scoring_rubric(7, 라이브러리 최저)을 보강한다. 분석 3인 1~5 척도와 GOLD 체류도 척도를 수치로 정의하고 9.5 합격선 환산 규칙을 명시한다. '갈음→가늠' 오타도 교정한다.","effort":"낮음","expected_gain":"단일 카드의 가장 낮은 세부 점수(7)를 직접 메워 최하위권을 끌어올린다. 오타 교정으로 신뢰도도 회복한다."},{"rank":7,"target":"전체 패턴","action":"비평가 캐스팅 점검표를 만들어 4인이 도메인·직무로도 분리되게 강제한다. 회계·재무 3인(p33·p37·p52·p54), 브랜드 4인(p10), 코치 3인(p67) 등 도메인 쏠림 카드부터 한 명씩 다른 축으로 재캐스팅한다.","effort":"중간","expected_gain":"persona_casting 8점대 카드를 보강하고 4색 교차 검증을 실제로 작동시킨다. 5-Color Harness 정체성의 핵심 가치를 회복한다."},{"rank":8,"target":"법무 검토·규제 대응","action":"카테고리 평균 최저(8.4) 7개 카드(p52·p61·p51·p50·p49·p53·p55)를 묶어 1~4순위 공통 패치를 우선 투입한다. 특히 passline_scene 6~7점대(p61·p52)와 boundaries 6~7점대(p55·p49·p50)를 집중 보강한다.","effort":"높음","expected_gain":"가장 약한 카테고리를 끌어올려 카테고리 간 편차를 줄인다. 법무 영역은 오용 리스크가 커 품질 균질화의 우선순위가 높다."},{"rank":9,"target":"전체 패턴","action":"BLACK 필드 합격선과 fullPrompt 본문 합격선의 9.5/9.7 표기 불일치를 전 카드에서 한쪽으로 통일한다(p71·p10·p35 등에서 발견된 헤더-본문 정합 오류).","effort":"낮음","expected_gain":"카드 요약과 본문의 정보 밀도·기준을 일치시켜 미세 불일치를 제거한다. 기계적 점검이라 빠르게 처리 가능하다."}],"narrative":"라이브러리는 전체 평균 8.6으로 단단한 바닥을 갖췄다. workflow(9), house_style(9), prohibitions(9), three_stage(8.9)는 거의 모든 카드에서 일관되게 높아, 구조와 문체의 골격은 이미 자산 수준이다. 약점은 흩어진 개별 결함이 아니라 네 개의 구조적 빈자리에 반복적으로 몰려 있다. 첫째, 분석 3인 합격선이 GOLD와 달리 관찰 가능한 장면이 아니라 추상 명제라 채점 기준이 흔들린다(passline_scene 8.1). 둘째, '적용하지 않는 경우'가 라우팅 대상 카드명 없이 선언에 그쳐 카드끼리 영역이 겹친다(boundaries 7.7, 최약). 이 두 가지는 카드별로 손볼 일이 아니라 공통 템플릿 한 벌과 라우팅 표 한 장으로 일괄 패치하는 것이 투입 대비 효과가 가장 크다. 먼저 손볼 곳은 위기 대응·법무 같은 오용 리스크가 큰 카드와 scoring_rubric이 7~8에 머문 카드이며, 채점 로직 통일과 라우팅 표는 신규 카드에도 재사용되는 운영 자산으로 남는다."}};
