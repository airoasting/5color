<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>Thumbnail · 5-Color Harness</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,600;12..96,700;12..96,800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  @font-face{
    font-family:'Pretendard Variable';
    font-weight:45 920;font-style:normal;font-display:swap;
    src:url('fonts/PretendardVariable.ttf') format('truetype-variations');
  }
  *{margin:0;padding:0;box-sizing:border-box}
  :root{
    --burgundy:#7A1F35;
    --pink:#F2B6C6;
    --display:'Bricolage Grotesque','Pretendard Variable',system-ui,sans-serif;
    --sans:'Pretendard Variable','Bricolage Grotesque',system-ui,sans-serif;
    --mono:'JetBrains Mono',ui-monospace,monospace;
  }
  html,body{width:1200px;height:630px;overflow:hidden;background:#7A1F35}
  .stage{
    position:relative;width:1200px;height:630px;overflow:hidden;
    background:#7A1F35;font-family:var(--sans);color:#fff;
  }

  /* CAST — full-bleed, faces kept, legs cropped */
  .cast{position:absolute;inset:0;width:1200px;height:630px;object-fit:cover;object-position:50% 16%}
  .scrim-top{
    content:'';position:absolute;left:0;right:0;top:0;height:200px;z-index:2;pointer-events:none;
    background:linear-gradient(180deg, rgba(122,31,53,0.82) 0%, rgba(122,31,53,0.30) 55%, rgba(122,31,53,0) 100%);
  }
  .scrim-bot{
    content:'';position:absolute;inset:0;z-index:2;pointer-events:none;
    background:linear-gradient(0deg,
      #7A1F35 0%,
      rgba(122,31,53,0.97) 24%,
      rgba(122,31,53,0.78) 40%,
      rgba(122,31,53,0.20) 56%,
      rgba(122,31,53,0) 68%);
  }

  /* CONTENT */
  .content{position:absolute;inset:0;z-index:3;display:flex;flex-direction:column;justify-content:space-between;padding:54px 66px 56px}
  .top{display:flex;align-items:center;justify-content:space-between}
  .brand{display:flex;align-items:center;gap:18px}
  .dots{display:flex;gap:10px}
  .dot{width:15px;height:15px;border-radius:50%;box-shadow:0 1px 3px rgba(0,0,0,.25)}
  .dot.black{background:#111111}
  .dot.red{background:#D63A2F}
  .dot.silver{background:#B5B3B0}
  .dot.blue{background:#3866D6}
  .dot.gold{background:#D7A839}
  .wordmark{font-family:var(--display);font-weight:800;font-size:25px;letter-spacing:-0.005em;color:#fff}
  .meta{font-family:var(--mono);font-size:13px;font-weight:600;letter-spacing:0.24em;text-transform:uppercase;color:#fff;background:rgba(122,31,53,0.55);border:1px solid rgba(255,255,255,0.28);padding:8px 16px;border-radius:999px;backdrop-filter:blur(2px)}

  .mid{max-width:780px}
  .eyebrow{font-family:var(--mono);font-size:15px;font-weight:500;letter-spacing:0.2em;color:var(--pink);margin-bottom:20px}
  .title{font-family:var(--sans);font-weight:800;font-size:74px;line-height:1.06;letter-spacing:-0.04em;color:#fff;word-break:keep-all}
  .title em{font-style:normal;color:var(--pink)}
  .sub{margin-top:26px;font-size:23px;font-weight:500;line-height:1.4;color:rgba(255,255,255,0.9);letter-spacing:-0.01em;word-break:keep-all}
  .sub em{font-style:normal;font-weight:700;color:var(--pink)}
</style>
</head>
<body>
  <div class="stage">
    <img class="cast" src="images/5color_d.png" alt="">
    <div class="scrim-top"></div>
    <div class="scrim-bot"></div>

    <div class="content">
      <header class="top">
        <div class="brand">
          <span class="dots" aria-hidden="true">
            <span class="dot black"></span><span class="dot red"></span><span class="dot silver"></span><span class="dot blue"></span><span class="dot gold"></span>
          </span>
          <span class="wordmark">5-COLOR HARNESS</span>
        </div>
        <span class="meta">AI ROASTING</span>
      </header>

      <section class="mid">
        <div class="eyebrow">프로젝트 지침 프롬프트 · 2026</div>
        <h1 class="title">하나의 프로젝트에,<br><em>다섯 명의 전문가.</em></h1>
        <p class="sub"><em>다섯 시선</em>으로 평가하면, 산출물의 격이 달라집니다.</p>
      </section>
    </div>
  </div>
</body>
</html>
